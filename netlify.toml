[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  publish = "dist"
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Serve the React portfolio app at /app and all its sub-routes
[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app.html"
  status = 200

# Redirect bare routes → React app under /app
[[redirects]]
  from = "/about"
  to = "/app/about"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/app/blog"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/app/blog/:splat"
  status = 301

[[redirects]]
  from = "/projects"
  to = "/app/projects"
  status = 301

[[redirects]]
  from = "/projects/*"
  to = "/app/projects/:splat"
  status = 301

[[redirects]]
  from = "/resources"
  to = "/app/resources"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/app/contact"
  status = 301

[[redirects]]
  from = "/case-study/*"
  to = "/app/case-study/:splat"
  status = 301

[functions]
  directory = "netlify/functions"
